<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Forex Signal Live Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f111a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #161925;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #23283d;
            text-align: center;
        }

        h1 {
            font-size: 22px;
            color: #4ef2d2;
            margin-bottom: 25px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #202436;
            border: 1px solid #2d334d;
            color: #fff;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        select:focus {
            border-color: #4ef2d2;
        }

        .btn-analyze {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff007f, #7928ca);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.5);
        }

        .result-box {
            margin-top: 25px;
            background: #1e2235;
            border-radius: 12px;
            padding: 20px;
            border: 1px dashed #2d334d;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .status {
            font-size: 15px;
            color: #a0a0a0;
            font-style: italic;
            margin-bottom: 10px;
        }

        .signal {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .buy-style {
            color: #00ff66;
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .sell-style {
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
        }

        .nosignal-style {
            color: #8e9aa8;
        }

        .details {
            margin-top: 12px;
            font-size: 14px;
            color: #ffffff;
            line-height: 1.6;
            background: #252a3d;
            padding: 10px 20px;
            border-radius: 8px;
            width: 100%;
        }
        
        .details b {
            color: #4ef2d2;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 POCKET OPTION AI BOT</h1>

        <div class="form-group">
            <label for="market">Safidio ny Marche (Pair):</label>
            <select id="market">
                <optgroup label="--- FOREX OTC ---">
                    <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
                    <option value="GBP/USD (OTC)">GBP/USD (OTC)</option>
                    <option value="USD/JPY (OTC)">USD/JPY (OTC)</option>
                    <option value="AUD/USD (OTC)">AUD/USD (OTC)</option>
                    <option value="USD/CHF (OTC)">USD/CHF (OTC)</option>
                    <option value="EUR/GBP (OTC)">EUR/GBP (OTC)</option>
                    <option value="EUR/JPY (OTC)">EUR/JPY (OTC)</option>
                    <option value="NZD/USD (OTC)">NZD/USD (OTC)</option>
                </optgroup>
                
                <optgroup label="--- COMMODITIES OTC ---">
                    <option value="GOLD (OTC)">GOLD / Volamena (OTC)</option>
                    <option value="SILVER (OTC)">SILVER (OTC)</option>
                    <option value="CRUDE OIL (OTC)">CRUDE OIL (OTC)</option>
                </optgroup>

                <optgroup label="--- STOCKS OTC ---">
                    <option value="APPLE (OTC)">APPLE INC (OTC)</option>
                    <option value="GOOGLE (OTC)">GOOGLE (OTC)</option>
                    <option value="MICROSOFT (OTC)">MICROSOFT (OTC)</option>
                    <option value="AMAZON (OTC)">AMAZON (OTC)</option>
                    <option value="TESLA (OTC)">TESLA INC (OTC)</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label for="timeframe">Safidio ny Timeframe / Expiration:</label>
            <select id="timeframe">
                <option value="1 MIN">1 Minitra (M1)</option>
                <option value="2 MIN">2 Minitra (M2)</option>
                <option value="3 MIN">3 Minitra (M3)</option>
                <option value="5 MIN">5 Minitra (M5)</option>
            </select>
        </div>

        <button class="btn-analyze" onclick="runAnalysis()">START ANALYSE 🔍</button>

        <div class="result-box">
            <div id="status" class="status">Miandry analyse...</div>
            <div id="signal" class="signal"></div>
            <div id="details" class="details" style="display: none;"></div>
        </div>
    </div>

    <script>
        async function runAnalysis() {
            const market = document.getElementById("market").value;
            const timeframe = document.getElementById("timeframe").value;
            
            const statusDiv = document.getElementById("status");
            const signalDiv = document.getElementById("signal");
            const detailsDiv = document.getElementById("details");

            statusDiv.innerHTML = `Mampiasa AI mianatra an'i ${market}...`;
            statusDiv.style.color = "#ffcc00";
            signalDiv.innerHTML = "";
            detailsDiv.style.display = "none";

            try {
                // Miantso ny Python Backend (app.py) mivantana
                const response = await fetch(`/api/analyze?market=${encodeURIComponent(market)}&timeframe=${encodeURIComponent(timeframe)}`);
                const data = await response.json();

                if (data.status === "success") {
                    statusDiv.innerHTML = `✅ Analyse matanjaka [${data.market}]`;
                    statusDiv.style.color = "#4ef2d2";

                    const now = new Date();
                    const timeStr = now.toTimeString().split(' ')[0];

                    signalDiv.innerHTML = data.signal;
                    signalDiv.className = `signal ${data.style}`;
                    
                    detailsDiv.style.display = "block";
                    detailsDiv.innerHTML = `
                        🕒 ORA: <b>${timeStr}</b><br>
                        ⏱ DURÉE: <b>${data.timeframes || timeframe}</b><br>
                        📊 RSI INDICATOR: <b>${data.rsi}</b><br>
                        📉 ASAO: <b>${data.action}</b>
                    `;
                } else {
                    statusDiv.innerHTML = `❌ Fahadisoana: ${data.message}`;
                    statusDiv.style.color = "#ff3333";
                }
            } catch (error) {
                statusDiv.innerHTML = "❌ Diso ny fifandraisana amin'ny server.";
                statusDiv.style.color = "#ff3333";
            }
        }
    </script>
</body>
</html>
